units:
  # kx and ky allow for easy- easi-er switching between MX and Choc.
  kx: u
  ky: u
  px: kx + 2
  py: ky + 2
  # These variables allow for updating the previews on https://ergogen.ceoloide.com
  $default_width: u
  $default_height: u
  # KiCAD places the PCB in the middle of nowhere to start with.
  # These variables give a starting place for later shifts.
  starting_x: 100
  starting_y: -120

  # Defaults to M2 Screws
  screwSize: 1
  standoffSize: 2.5

points:
  zones:
    r0:
      anchor:
        shift: ["starting_x-.5u -6", "starting_y+2ky+3"]
      columns:
        func6:
        func7:
        func8:
        func9:
        func10:
        func11:
        func12:
        printscreen:
          key:
            spread: 1.31u
        delete:

        home:
          key:
            spread: 2.5u
        insert:
        pgup:
        pgdn:
      rows:
        single:
        
    r1:
      anchor:
        shift: [starting_x -.5kx , starting_y+1ky]
      columns:
        num6:
          key:

        num7:
        num8:
        num9:
        num10:
        hyphen:
        equals:
        backspc:
          key:
            width: 2u
            spread: 1.5u

      rows:
        single:
        
    r2:
      anchor:
        shift: ["starting_x ", "starting_y"]
      columns:
        y:
          key:
            column_net: P0
        u:
          key:
            column_net: P1
        i:
          key:
            column_net: P2
        o:
          key:
            column_net: P3
        p:
          key:
            column_net: P4
        bracket1:
          key:
            column_net: P5
        bracket2:
          key:
            column_net: P6
        backslash:
          key:
            spread: 1.25u
            width: 1.5u
      rows:
        single:
          row_net: P7

    r3:
      anchor:
        shift: ["starting_x +5", "starting_y - ky"]
      columns:
        h:
          key:
            column_net: P0
        j:
          key:
            column_net: P1
        k:
          key:
            column_net: P2
        l:
          key:
            column_net: P3
        colon:
          key:
            column_net: P4
        quotes:
          key:
            column_net: P5
        enter:
          key:
            width: 2.25u
            spread: 1.62u
      rows:
        single:
          row_net: P8

    r4:
      anchor:
        shift: ["starting_x -3+1u", "starting_y - 2ky"]
      columns:

        n: 
          key: 
            column_net: P1 
        m: 
          key: 
            column_net: P2 
        comma: 
          key: 
            column_net: P3
        period:
          key:
            column_net: P4
        slash:
          key:
            column_net: P5
        shift:
          key:
            width: 1.75u
            spread: 1.38u
            column_net: P6
      rows:
        single:
          row_net: P9



    r5:
      anchor:
        shift: ["starting_x + 2.4ky", "starting_y - 3ky"]
      columns:
        space:
          key:
            column_net: P0
            width: 2.75u
            shift: [-0.68u, 0]

        rightalt:
          key:
            spread: 1.25u
            column_net: P1
        fn:
        rcntrl:

      rows:
        single:
          row_net: P14

# arrowkeys
    arrowkeysr0:
      anchor:
        shift: ["starting_x + 7.8u", "starting_y - 2ky-3"]
      columns:
        up:

    arrowkeysr1:
      anchor:
        shift: ["starting_x + 6.8u", "starting_y - 3ky-3"]
      columns:      
        left:
        down:
        right:
    

# numpad
    numpadr0:
      anchor:
        shift: ["starting_x + 10u", "starting_y +1ky"]
      columns:
        num:
        slash:
        star:
        minus:
        
    numpadr0r1:
      anchor:
        shift: ["starting_x + 10u", "starting_y"]
      columns:      
        7:
        8:
        9:
        plus:
          key:
            height: 2u
            shift: [0, -.5u]
    
    numpadr0r2:
      anchor:
        shift: ["starting_x + 10u", "starting_y-1ky"]
      columns:      
        4:
        5:
        6:
    
    numpadr0r3:
      anchor:
        shift: ["starting_x + 10u", "starting_y-2ky"]
      columns:      
        1:
        2:
        3:
        enter:
          key:
            height: 2u
            shift: [0, -.5u]
      
      rows:
        single:
    
    numpadr0r4:
      anchor:
        shift: ["starting_x + 10u", "starting_y-3ky"]
      columns:      
        0:
          key: 
            width: 2u
            shift: [.5u, 0]
        dot:
          key:
            shift: [1u, 0]
      

  

          
outlines:

  keys:
    - what: rectangle
      where: true
      size: [kx-0.5,ky-0.5]
#     - what: rectangle
#       where: [r3right_quotes_single]
#       size: [kx*1.4, ky]
#     - what: rectangle
#       where: [thumbfanright_space_single]
#       size: [kx*1.5, ky]

#       fillet: 2

  outline:
    - what: polygon
      operation: stack
      points:
        - ref: r0_func6_single
          shift: [-0.6px, 0.6py]
        - ref: r0_pgdn_single
          shift: [0.6px, 0.6py]
        - ref: numpadr0r3_enter_single
          shift: [0.6px, -1.2py]
        - ref: r5_space_single
          shift: [-1.6px, -0.8py]
        - ref: r3_h_single
          shift: [-1.6px, -0.8py]



      fillet: 3

  

